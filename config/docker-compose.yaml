  # ==================== SonarQube (代码质量检查) ====================
  sonarqube:
    container_name: sonarqube
    image: sonarqube:25.12.0.117093-community
    ports:
      - "9001:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgresql:5432/sonarqube
      - SONAR_JDBC_USERNAME=postgres
      - SONAR_JDBC_PASSWORD=Dev1234!
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_WEB_JAVAADDITIONALOPTS=-Djava.security.egd=file:/dev/./urandom
    volumes:
      - /home/bunny/develop/docker-compose/develop/sonarqube/data:/opt/sonarqube/data
      - /home/bunny/develop/docker-compose/develop/sonarqube/extensions:/opt/sonarqube/extensions
      - /home/bunny/develop/docker-compose/develop/sonarqube/logs:/opt/sonarqube/logs
    depends_on:
      - postgresql
    networks:
      - microservices-net
    restart: always
    # 添加健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://172.17.0.1:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Nacos ====================
  nacos:
    container_name: nacos-server
    image: nacos/nacos-server:v3.1.0
    ports:
      - "18080:8080"
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=QnVubnktQXV0aC1TZXJ2ZXItUHJpdmF0ZS1TZWNyZXRLZXk=
      - NACOS_AUTH_IDENTITY_KEY=nacosAdmin
      - NACOS_AUTH_IDENTITY_VALUE=Dev1234!
      - MYSQL_SERVICE_HOST=mysql-master
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_USER=dev_user
      - MYSQL_SERVICE_PASSWORD=Dev1234!
    volumes:
      - /home/bunny/develop/docker-compose/develop/nacos/logs:/home/nacos/logs
      - /home/bunny/develop/docker-compose/develop/nacos/data:/home/nacos/data
      - /home/bunny/develop/docker-compose/develop/nacos/config:/home/nacos/config
    depends_on:
      - mysql-master
    networks:
      - microservices-net
    restart: always

