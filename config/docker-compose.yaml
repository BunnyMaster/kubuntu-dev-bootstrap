  # ==================== Redis 哨兵模式集群 ====================
  redis-master:
    container_name: redis-master
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: |
      redis-server
      --requirepass Dev1234!
      --masterauth Dev1234!
      --appendonly yes
    volumes:
      - /home/bunny/develop/docker-compose/develop/redis/master/data:/data
    networks:
      - microservices-net
    restart: always

